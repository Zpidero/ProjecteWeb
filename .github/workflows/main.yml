name: Django CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-test-key' }}

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./DjangoProject1

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # uv.lock is inside DjangoProject1, which matches the working-directory
          cache-dependency-glob: "DjangoProject1/uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Build Docker image
        # Dockerfile is located inside DjangoProject1/
        run: docker build -t django-app .

      - name: Run Tests
        run: uv run python manage.py test
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-test-key' }}