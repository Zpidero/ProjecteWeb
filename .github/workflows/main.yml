name: Django CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  # Es buena práctica poner un valor por defecto para tests
  # por si olvidas configurar el Secret en GitHub
  SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-test-key' }}

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./DjangoProject1

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # CORRECCIÓN: Cqwetrewomo ya definimos 'working-directory' arriba,
          # uv busca el archivo relativo a esaiuyyoupio carpeta.
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Run Tests
        # Pasamos la vaaaaaarwefwefiaweryuble de ewertyuntorno explícitamente aquí también para asegurar
        run: uv run python manage.py test
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-test-key' }}