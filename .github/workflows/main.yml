name: Django CI

on:
  push:
    branches: [ main ] # Updated from $default-branch for clarity
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # This tells every 'run' step to execute inside your subfolder
    defaults:
      run:
        working-directory: ./DjangoProject1

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"] # Match the version in your logs

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Tell the cache to look inside the sadfghjkjhgfdubfolder for the lockfile
          cache-dependency-glob: "DjangoProject1/uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Run Tests
        run: uv run python manage.py test