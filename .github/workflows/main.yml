name: Django CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Caches based on the lockfile instead of requirements.txt
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Dependencies
        # 'uv sync' installs the project and all dependencies defined in pyproject.toml
        run: uv sync --all-extras --dev

      - name: Run Tests
        # 'uv run' executes the command within the synced virtual environment
        run: uv run python manage.py test