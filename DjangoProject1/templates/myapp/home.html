{% extends "base.html" %}
{% block Title %}Home{% endblock %}
{% block body %}
<a class="flex items-center justify-center py-4">
    {% include 'components/button.html' with text="START" %}
</a>
<div id="overlay" class="fixed inset-0 bg-black/50 hidden z-50 flex items-start justify-center pt-20">
    <div class="bg-gray-900 rounded-xl p-6 flex flex-col items-center max-w-4xl w-full">
        <h2 class="text-2xl font-bold mb-4 text-white">Choose a formation</h2>
        <div id="formations-container" class="flex gap-4 justify-center flex-nowrap"></div>
        <button id="close-overlay" class="mt-4 px-4 py-2 bg-red-600 rounded hover:bg-red-600/50 text-white font-bold">
            Close
        </button>
    </div>
</div>

<script>
// For the moment only this.
const formations = [
    { name: "4-3-3", description: "4 defenders, 3 midfielders, 3 forwards" },
    { name: "4-4-2", description: "4 defenders, 4 midfielders, 2 forwards" },
    { name: "3-5-2", description: "3 defenders, 5 midfielders, 2 forwards" },
    { name: "5-3-2", description: "5 defenders, 3 midfielders, 2 forwards" },
    { name: "3-4-3", description: "3 defenders, 4 midfielders, 3 forwards" }
];
document.querySelector('button').addEventListener('click', function() {
    const container = document.getElementById('formations-container');
    container.innerHTML = '';
    formations.forEach((formation, index) => {
        const div = document.createElement('div');
        div.className = "bg-yellow-500 hover:bg-yellow-600 text-black rounded-lg p-4 cursor-pointer hover:scale-105 transition text-center min-w-[100px]";
        div.innerHTML = `<div class="font-bold text-lg">${formation.name}</div>
                         <div class="text-sm mt-1">${formation.description}</div>`;
        div.dataset.index = index;
        div.classList.add('select-formation');
        container.appendChild(div);
    });

    document.getElementById('overlay').classList.remove('hidden');
});

document.getElementById('close-overlay').addEventListener('click', function() {
    document.getElementById('overlay').classList.add('hidden');
});

document.addEventListener('click', function(e) {
    const btn = e.target.closest('.select-formation');
    if (btn) {
        const index = btn.dataset.index;
        const selectedFormation = formations[index];

        //Save selection
        sessionStorage.setItem('formation', JSON.stringify(selectedFormation));

        // Redirect to the board screen
        window.location.href = '/game/';
    }
});
</script>
{% endblock %}
