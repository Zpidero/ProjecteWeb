{% extends "base.html" %}
{% load static %}
{% block Title %}Game{% endblock %}

{% block body %}

<div id="formation-container" class="flex flex-col-reverse items-center justify-center min-h-screen gap-6 p-4 bg-gray-800 overflow-hidden"></div>

<div id="overlay" class="fixed inset-0 bg-black/50 hidden z-50 flex items-start justify-center pt-20 overflow-auto">
    <div class="bg-gray-900 rounded-xl p-8 flex flex-col items-center max-w-7xl w-full">
        <h2 class="text-4xl font-bold mb-6 text-white">Choose a player</h2>
        <div id="players-container" class="flex flex-wrap gap-6 justify-center"></div>
        <button id="close-overlay" class="mt-6 px-6 py-3 bg-red-600 rounded hover:bg-red-700 text-white font-bold text-lg">
            Close
        </button>
    </div>
</div>

<style>
.player-card {
    width: clamp(100px, 12vw, 150px);
    height: clamp(160px, 20vw, 220px);
    background-color: #C9A66B;
    border-radius: 12px;
    font-weight: bold;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s;
}
.player-card:hover { transform: scale(1.1); }

.select-player {
    width: clamp(150px, 18vw, 220px);
    height: clamp(200px, 24vw, 280px);
    cursor: pointer;
    transition: transform 0.2s;
}
.select-player:hover { transform: scale(1.05); }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const formation_chosen = JSON.parse(sessionStorage.getItem("formation"));
    if (!formation_chosen) return;

    const [def, mid, att] = formation_chosen.name.split("-").map(Number);
    const formationContainer = document.getElementById("formation-container");

    function createRow(count, positionCode, prefix) {
        let html = `<div class="flex gap-4 justify-center w-full">`;
        for (let i = 1; i <= count; i++) {
            html += `
                <button class="player-card" data-position="${positionCode}">
                    ${prefix}${i}
                </button>
            `;
        }
        html += `</div>`;
        return html;
    }

    let html = "";
    html += createRow(att, "FW", "FW");
    html += createRow(mid, "MF", "MF");
    html += createRow(def, "DF", "DF");
    html += `<div class="flex justify-center w-full"><button class="player-card" data-position="GK">GK</button></div>`;
    formationContainer.innerHTML = html;

    let selectedButton = null;

    formationContainer.addEventListener('click', function(e) {
        const btn = e.target.closest('.player-card');
        if (!btn) return;

        selectedButton = btn;
        document.getElementById('overlay').classList.remove('hidden');

        fetch(`/random-players/?position=${btn.dataset.position}`)
            .then(res => res.json())
            .then(players => {
                const container = document.getElementById('players-container');
                container.innerHTML = '';

                if (players.length === 0) {
                    container.innerHTML = '<p class="text-white">No players available for this position</p>';
                    return;
                }

                players.forEach(player => {
                    container.innerHTML += `
                        <button class="select-player text-black hover:scale-110 transition">
                            <svg viewBox="0 0 300 420" class="w-full h-full">
                                <path d="M40 20 Q20 40 20 80 L20 300 Q20 340 60 360 L150 410 L240 360 Q280 340 280 300 L280 80 Q280 40 260 20 Q220 0 150 0 Q80 0 40 20 Z"
                                      stroke="black" stroke-width="3" fill="#C9A66B"/>
                                <foreignObject x="50" y="230" width="200" height="60">
                                    <div xmlns="http://www.w3.org/1999/xhtml"
                                         class="text-center font-extrabold text-2xl leading-tight break-words">
                                        ${player.Name}
                                    </div>
                                </foreignObject>
                                <text x="40" y="60" class="font-mono font-extrabold text-4xl">${player.Total}</text>
                                <text x="40" y="90" class="font-extrabold text-2xl">${player.Position}</text>
                                <image x="100" y="50" width="160" height="160" href="${player.Image}" preserveAspectRatio="xMidYMid slice"/>
                                <image x="40" y="160" width="60" height="60" href="/static/images/elements/${player.Element}.png"/>
                                <image x="30" y="80" width="70" height="100" href="/static/images/teams/${player.Team}.png"/>
                            </svg>
                        </button>
                    `;
                });
            })
            .catch(err => console.error(err));
    });

    document.getElementById('close-overlay').addEventListener('click', function() {
        document.getElementById('overlay').classList.add('hidden');
    });

    document.addEventListener('click', function(e) {
        if(e.target.closest('.select-player') && selectedButton) {
            const playerBtn = e.target.closest('.select-player');
            selectedButton.innerHTML = playerBtn.innerHTML;
            selectedButton.style.background = "transparent";
            document.getElementById('overlay').classList.add('hidden');
        }
    });

});
</script>

{% endblock %}
