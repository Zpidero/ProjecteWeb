{% extends "base.html" %}
{% load static %}
{% block Title %}Inazuma FutDraft{% endblock %}
{% block Title %}Game - Draft{% endblock %}

{% block body %}
<div id="setup-container" class="flex flex-col items-center justify-center min-h-screen bg-gray-900 p-6">
    <h1 class="text-5xl font-black text-white mb-10 italic uppercase tracking-tighter">Select Formation</h1>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <button onclick="startDraft('4-4-2')" class="formation-btn">4-4-2</button>
        <button onclick="startDraft('4-3-3')" class="formation-btn">4-3-3</button>
        <button onclick="startDraft('3-5-2')" class="formation-btn">3-5-2</button>
    </div>
</div>

<div id="game-container" class="hidden flex flex-col items-center justify-center min-h-screen gap-6 p-4 bg-[#002b36] overflow-hidden relative">
    <div id="formation-container" class="flex flex-col-reverse items-center justify-center gap-6 w-full"></div>

    <button onclick="resetDraft()" class="mt-8 px-4 py-2 bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white border border-red-500 rounded-full font-bold transition-all">
        Reset Draft
    </button>
</div>

<div id="formation-overlay" class="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center">
    <div class="bg-gray-900 rounded-xl p-8 flex flex-col items-center max-w-4xl w-full border border-yellow-500">
        <h2 class="text-4xl font-bold mb-6 text-white uppercase italic">Select Formation</h2>
        <div id="formations-list" class="flex flex-wrap gap-4 justify-center">
            </div>
    </div>
</div>

<div id="formation-container" class="flex flex-col-reverse items-center justify-center min-h-screen gap-6 p-4 bg-gray-800 overflow-hidden">
    </div>

<div id="overlay" class="fixed inset-0 bg-black/80 hidden z-50 flex items-start justify-center pt-10 overflow-auto backdrop-blur-sm">
    <div class="bg-gray-900 rounded-[3rem] p-10 flex flex-col items-center max-w-7xl w-full border border-white/10 shadow-2xl">
        <h2 class="text-4xl font-black mb-8 text-white italic uppercase">Select your Player</h2>
        <div id="players-container" class="flex flex-wrap gap-6 justify-center"></div>
        <button id="close-overlay" class="mt-10 px-8 py-3 bg-gray-700 rounded-full hover:bg-white hover:text-black text-white font-bold transition-all">
            Cancel
        </button>
    </div>
</div>

<div id="save-bar" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-4 bg-gray-900 border border-yellow-500 rounded-2xl px-6 py-4 shadow-2xl">
    <input id="draft-name" type="text" placeholder="Nom de l'equip..."
        class="bg-gray-800 text-white border border-gray-600 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-yellow-400 w-52">
    <button id="save-btn"
        class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-5 py-2 rounded-xl text-sm transition active:scale-95">
        Guardar equip
    </button>
    <span id="save-msg" class="text-sm hidden"></span>
</div>

<style>
.formation-btn {
    @apply px-10 py-6 bg-white text-[#002b36] text-3xl font-black rounded-2xl hover:bg-yellow-400 hover:scale-110 transition-all duration-300 shadow-xl italic;
}

/* Your existing styles */
.player-card {
    width: clamp(110px, 12vw, 160px);
    height: clamp(160px, 20vw, 230px);
    background-color: #C9A66B;
    border: 3px solid rgba(0,0,0,0.2);
    border-radius: 15px;
    font-weight: 900;
    font-style: italic;
    color: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
    overflow: hidden; /* Important for SVG display */
}
.player-card:hover {
    transform: translateY(-10px) scale(1.05);
    background-color: #e2bd81;
    border-color: white;
}

.select-player {
    width: 240px;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
    width: clamp(150px, 18vw, 220px);
    height: clamp(200px, 24vw, 280px);
    cursor: pointer;
    transition: transform 0.2s;
}
.select-player:hover { transform: scale(1.05); }

/* Formation button style */
.formation-btn {
    background: #eab308;
    color: black;
    padding: 1.5rem;
    border-radius: 0.75rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}
.formation-btn:hover { background: #facc15; transform: translateY(-5px); }
</style>

<script>
function startDraft(formation) {
    sessionStorage.setItem("formation", JSON.stringify({ name: formation }));
    document.getElementById('setup-container').classList.add('hidden');
    document.getElementById('game-container').classList.remove('hidden');
    renderPitch();
}

function resetDraft() {
    sessionStorage.removeItem("formation");
    location.reload();
}

function renderPitch() {
    const formation_chosen = JSON.parse(sessionStorage.getItem("formation"));
    if (!formation_chosen) return;

    const [def, mid, att] = formation_chosen.name.split("-").map(Number);
    const formationContainer = document.getElementById("formation-container");
document.addEventListener('DOMContentLoaded', function() {
    const formationOverlay = document.getElementById('formation-overlay');
    const formationsList = document.getElementById('formations-list');
    const selectedPlayers = {}; // Diccionari d'IDs
    let selectedButton = null;

    const formations = [
        { name: "4-3-3", description: "4 Defenders, 3 Midfielders, 3 Forwards" },
        { name: "4-4-2", description: "4 Defenders, 4 Midfielders, 2 Forwards" },
        { name: "3-5-2", description: "3 Defenders, 5 Midfielders, 2 Forwards" },
        { name: "5-3-2", description: "5 Defenders, 3 Midfielders, 2 Forwards" }
    ];

    // --- 1. SELECCIÓ DE FORMACIÓ ---
    formations.forEach(f => {
        const btn = document.createElement('div');
        btn.className = "formation-btn text-center min-w-[150px]";
        btn.innerHTML = `<div class="text-2xl">${f.name}</div><div class="text-xs">${f.description}</div>`;
        btn.onclick = () => {
            sessionStorage.setItem("formation", JSON.stringify(f));
            formationOverlay.classList.add('hidden');
            renderPitch(f.name);
        };
        formationsList.appendChild(btn);
    });

    // --- 2. DIBUIXAR EL CAMP ---
    function renderPitch(formationName) {
        const [def, mid, att] = formationName.split("-").map(Number);
        const container = document.getElementById("formation-container");

    function createRow(count, positionCode, prefix) {
        let html = `<div class="flex gap-6 justify-center w-full">`;
        for (let i = 1; i <= count; i++) {
            html += `<button class="player-card" data-position="${positionCode}">${prefix}${i}</button>`;
        }
        html += `</div>`;
        return html;
    }
        function createRow(count, positionCode, prefix) {
            let html = `<div class="flex gap-4 justify-center w-full">`;
            for (let i = 1; i <= count; i++) {
                html += `<button class="player-card" data-position="${positionCode}">${prefix}${i}</button>`;
            }
            html += `</div>`;
            return html;
        }

    let html = "";
    html += createRow(att, "FW", "FW");
    html += createRow(mid, "MF", "MF");
    html += createRow(def, "DF", "DF");
    html += `<div class="flex justify-center w-full"><button class="player-card" data-position="GK">GK</button></div>`;
    formationContainer.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
    // Si ja hi havia una formació, anem directes al joc
    if (sessionStorage.getItem("formation")) {
        document.getElementById('setup-container').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        renderPitch();
    }

    const formationContainer = document.getElementById("formation-container");
    let selectedButton = null;

    formationContainer.addEventListener('click', function(e) {
        container.innerHTML = createRow(att, "FW", "FW") + 
                            createRow(mid, "MF", "MF") + 
                            createRow(def, "DF", "DF") + 
                            `<div class="flex justify-center w-full"><button class="player-card" data-position="GK">GK</button></div>`;
    }

    // --- 3. CLIC AL BOTÓ DEL CAMP (OBRIR OVERLAY) ---
    document.getElementById("formation-container").addEventListener('click', function(e) {
        const btn = e.target.closest('.player-card');
        if (!btn) return;

        selectedButton = btn;
        const overlay = document.getElementById('overlay');
        const container = document.getElementById('players-container');

        overlay.classList.remove('hidden');
        container.innerHTML = '<div class="text-white text-2xl font-bold animate-pulse">Searching players...</div>';

        fetch(`/random-players/?position=${btn.dataset.position}&min=965&max=999`)
            .then(res => res.json())
            .then(players => {
                container.innerHTML = '';
                players.forEach(player => {
                    // Fem servir un placeholder si no hi ha foto
                    const imgUrl = player.Image || 'https://via.placeholder.com/300x300?text=No+Photo';


                    const categoryStyles = {
                        1: "bg-gradient-to-br from-[#7a4a1f] to-[#cd7f32] shadow-[0_0_10px_#cd7f32]",
                        2: "bg-gradient-to-br from-gray-200 to-[#c0c0c0] shadow-[0_0_10px_#c0c0c0]",
                        3: "bg-gradient-to-br from-yellow-200 via-yellow-400 to-[#ffd700] shadow-[0_0_15px_#ffd700]",
                        4: "bg-gradient-to-br from-cyan-200 via-blue-300 to-[#00ffff] shadow-[0_0_20px_#00ffff] animate-pulse"
                    };
                    const fill = `url(#cat${player.Category})`;
                    container.innerHTML += `
                        <button class="select-player text-black hover:z-50">
                            <svg viewBox="0 0 300 420" class="w-full h-full drop-shadow-2xl">
                        <button class="select-player text-black hover:scale-110 transition" data-player-id="${player.id}">
                            <svg viewBox="0 0 300 420" class="w-full h-full">
                                <defs>
                                    <linearGradient id="cat1" x1="0" y1="0" x2="1" y2="1">
                                        <stop offset="0%" stop-color="#3a2a1a"/>
                                        <stop offset="100%" stop-color="#cd7f32"/>
                                    </linearGradient>

                                    <linearGradient id="cat2">
                                        <stop offset="0%" stop-color="#f5f5f5"/>
                                        <stop offset="100%" stop-color="#c0c0c0"/>
                                    </linearGradient>

                                    <linearGradient id="cat3">
                                        <stop offset="0%" stop-color="#fff7b0"/>
                                        <stop offset="50%" stop-color="#ffd700"/>
                                        <stop offset="100%" stop-color="#b8860b"/>
                                    </linearGradient>

                                    <linearGradient id="cat4">
                                        <stop offset="0%" stop-color="#00ffff"/>
                                        <stop offset="50%" stop-color="#008cff"/>
                                        <stop offset="100%" stop-color="#00ffff"/>
                                    </linearGradient>
                                    <filter id="glow">
                                        <feGaussianBlur stdDeviation="3" result="blur"/>
                                        <feMerge>
                                            <feMergeNode in="blur"/>
                                            <feMergeNode in="SourceGraphic"/>
                                        </feMerge>
                                    </filter>
                                </defs>
                                <path d="M40 20 Q20 40 20 80 L20 300 Q20 340 60 360 L150 410 L240 360 Q280 340 280 300 L280 80 Q280 40 260 20 Q220 0 150 0 Q80 0 40 20 Z"
                                      stroke="black" stroke-width="3" fill="#C9A66B"/>
                                <foreignObject x="50" y="215" width="200" height="65">
                                    <div xmlns="http://www.w3.org/1999/xhtml" class="text-center font-black text-2xl leading-tight uppercase italic">
                                        ${player.Name}
                                      stroke="black" stroke-width="3" fill="${fill}" filter="url(#glow)"/>
                                <foreignObject x="50" y="220" width="200" height="60">
                                    <div xmlns="http://www.w3.org/1999/xhtml"
                                         class="text-center font-extrabold text-2xl leading-tight break-words">
                                        ${(player.Name?.length || 0) > 14 ? (player.Nickname || player.Name) : player.Name}
                                    </div>
                                </foreignObject>
                                <text x="40" y="65" class="font-black text-5xl" style="font-family: sans-serif;">${player.Total}</text>
                                <text x="45" y="95" class="font-bold text-xl opacity-60">${player.Position}</text>

                                <g class="stats text-[14px] font-bold">
                                    <text x="50" y="290">POW ${player.Power}</text>
                                    <text x="50" y="320">CON ${player.Control}</text>
                                    <text x="50" y="350">TEC ${player.Technique}</text>
                                    <text x="160" y="290">PRE ${player.Pressure}</text>
                                    <text x="160" y="320">PHY ${player.Physical}</text>
                                    <text x="160" y="350">AGI ${player.Agility}</text>
                                    <text x="105" y="380">INT ${player.Intelligence}</text>
                                </g>

                                <image x="100" y="45" width="165" height="165" href="${imgUrl}" preserveAspectRatio="xMidYMid slice"/>
                            </svg>
                        </button>
                    `;
                                <text x="40" y="60" class="font-mono font-extrabold text-4xl">${player.Total}</text>
                                <text x="40" y="90" class="font-extrabold text-2xl">${player.Position}</text>
                                <image x="100" y="50" width="160" height="160" href="${player.Image}" preserveAspectRatio="xMidYMid slice"/>
                                <image x="40" y="160" width="60" height="60" href="/static/images/elements/${player.Element}.png"/>
                                <image x="30" y="80" width="70" height="100" href="/static/images/teams/${player.Team}.png"/>
                                <text x="50" y="280" class="font-bold text-xl">POW ${player.Power}</text>
                                <text x="160" y="280" class="font-bold text-xl">PRE ${player.Pressure}</text>
                                </svg>
                        </button>`;
                });
            });
    });

    document.getElementById('close-overlay').addEventListener('click', () => {
        document.getElementById('overlay').classList.add('hidden');
            });
    });

    // Seleccionar jugador
    // --- 4. SELECCIONAR JUGADOR DE LA LLISTA ---
    document.addEventListener('click', function(e) {
        const playerBtn = e.target.closest('.select-player');
        if(playerBtn && selectedButton) {
            selectedButton.innerHTML = playerBtn.innerHTML;
            selectedButton.style.background = "transparent";
            selectedButton.style.border = "none";
            selectedButton.style.width = "180px";
            selectedButton.style.height = "auto";
            selectedButton.disabled = true;
            document.getElementById('overlay').classList.add('hidden');
        }
    });
});
        
        if (playerBtn && selectedButton) {
            const playerId = playerBtn.getAttribute('data-player-id');
            const allCards = [...document.querySelectorAll('#formation-container .player-card')];
            const btnIndex = allCards.indexOf(selectedButton);

            if (playerId && btnIndex !== -1) {
                selectedPlayers[btnIndex] = playerId; // Guardem l'ID!
                
                selectedButton.innerHTML = playerBtn.innerHTML;
                selectedButton.style.background = "transparent";
                
                document.getElementById('overlay').classList.add('hidden');
                document.getElementById('save-bar').classList.remove('hidden'); // MOSTRAR BOTÓ GUARDAR
            }
        }
    });

    // Botó tancar overlay
    document.getElementById('close-overlay').onclick = () => document.getElementById('overlay').classList.add('hidden');

    // --- 5. GUARDAR A LA BASE DE DADES ---
    document.getElementById('save-btn').onclick = async function() {
        const name = document.getElementById('draft-name').value.trim() || 'El meu equip';
        const formationObj = JSON.parse(sessionStorage.getItem('formation') || '{}');
        const formation = formationObj.name || "4-3-3";
        const players = Object.values(selectedPlayers).filter(Boolean);

        if (players.length === 0) {
            showMsg('Tria almenys un jugador!', 'text-red-400');
            return;
        }

        this.disabled = true;
        this.textContent = 'Guardant...';

        try {
            const res = await fetch('/save-draft/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ name, formation, players }),
            });
            const data = await res.json();
            if (data.ok) {
                showMsg('✓ Equip guardat!', 'text-green-400');
                window.location.href = '/meus-drafts/'; // Opcional: Redirigir a la llista
            } else {
                showMsg('Error: ' + data.error, 'text-red-400');
            }
        } catch (e) {
            showMsg('Error de connexió', 'text-red-400');
        } finally {
            this.disabled = false;
            this.textContent = 'Guardar equip';
        }
    };

    function showMsg(text, cls) {
        const el = document.getElementById('save-msg');
        el.textContent = text;
        el.className = `text-sm ${cls}`;
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 3000);
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});


</script>
{% endblock %}
