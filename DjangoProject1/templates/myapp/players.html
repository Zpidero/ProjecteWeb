{% extends 'base.html' %}

{% block Title %}El Meu Perfil - Inazuma FutDraft{% endblock %}

{% block body %}
<main class="min-h-screen bg-[#001b22] pt-28 pb-12 text-white">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- SECCIÓ HERO -->
        <section class="max-w-7xl mx-auto px-4">
            <div class="relative w-full h-[280px] overflow-hidden rounded-3xl group shadow-2xl">
                <div class="absolute inset-0 bg-cover bg-center" style='background-image:url("https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=2069&auto=format&fit=crop")'></div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#001b22] via-[#001b22]/40 to-transparent"></div>

                <div class="relative h-full flex items-end pb-8 px-8">
                    <div class="flex flex-col md:flex-row items-end gap-6 w-full">
                        <!-- IMATGE DE PERFIL (p_form) -->
                        <div class="relative group/avatar">
                            <img class="w-32 h-32 md:w-40 md:h-40 rounded-3xl border-4 border-[#002b36] object-cover shadow-2xl bg-[#002b36]"
                                 src="{{ user.profile.image.url }}" id="profile-preview"/>
                            
                            <label for="id_image" id="avatar-label" class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-3xl opacity-0 transition-all cursor-pointer hidden">
                                <svg class="w-10 h-10 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-width="2"></path></svg>
                                <!-- Renderitzem el camp del form d'imatge però amagat -->
                                <input type="file" name="image" id="id_image" class="hidden" accept="image/*" onchange="previewImage(event)">
                            </label>
                        </div>
                        <div class="mb-2">
                            <h2 class="text-4xl font-black text-white">@{{ user.username }}</h2>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- DADES I SEGURETAT -->
        <section class="max-w-7xl mx-auto px-4 mt-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- BLOC DADES (u_form) -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-[#002b36] rounded-3xl border border-white/10 p-8">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold text-yellow-400 uppercase italic">Dades Personals</h3>
                            <button type="button" onclick="toggleEdit()" id="edit-btn" class="text-sm bg-white/10 px-4 py-2 rounded-lg">Editar</button>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-xs text-white/40 font-bold uppercase">Nom d'usuari</label>
                                <input type="text" name="username" value="{{ u_form.username.value|default:'' }}" class="form-input w-full bg-[#001b22] border border-white/10 p-4 rounded-2xl" disabled>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs text-white/40 font-bold uppercase">Email</label>
                                <input type="email" name="email" value="{{ u_form.email.value|default:'' }}" class="form-input w-full bg-[#001b22] border border-white/10 p-4 rounded-2xl" disabled>
                            </div>
                            <!-- Afegeix first_name i last_name si els tens al teu UserUpdateForm -->
                        </div>

                        <div id="save-actions" class="hidden flex justify-end mt-6">
                            <button type="submit" name="update_profile" class="bg-yellow-500 text-[#002b36] px-8 py-3 rounded-2xl font-black">GUARDAR CANVIS</button>
                        </div>
                    </div>
                </div>

                <!-- BLOC CONTRASENYA (pass_form) -->
                <div class="bg-[#002b36] rounded-3xl border border-white/10 p-8">
                    <h3 class="text-lg font-bold mb-6 text-yellow-400">Seguretat</h3>
                    <div class="space-y-4">
                        {% for field in pass_form %}
                        <div class="space-y-1">
                            <label class="text-[10px] text-white/40 font-bold uppercase">{{ field.label }}</label>
                            <input type="password" name="{{ field.html_name }}" class="w-full bg-[#001b22] border border-white/10 p-3 rounded-xl focus:border-yellow-400 outline-none text-sm">
                            {% if field.errors %}<p class="text-red-500 text-xs">{{ field.errors.0 }}</p>{% endif %}
                        </div>
                        {% endfor %}
                        <button type="submit" name="change_password" class="w-full bg-white/5 hover:bg-yellow-400 hover:text-[#002b36] border border-white/10 py-3 rounded-xl font-bold transition-all mt-2 text-xs uppercase">
                            Actualitzar Contrasenya
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </form>
</main>

<script>
function toggleEdit() {
    document.querySelectorAll('.form-input').forEach(i => i.disabled = !i.disabled);
    document.getElementById('save-actions').classList.toggle('hidden');
    document.getElementById('avatar-label').classList.toggle('hidden');
}
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = () => document.getElementById('profile-preview').src = reader.result;
    reader.readAsDataURL(event.target.files[0]);
}
</script>
{% endblock %}
