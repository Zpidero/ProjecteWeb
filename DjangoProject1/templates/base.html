<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block Title %}Inazuma FutDraft{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white">

    <div class="fixed top-0 w-full z-50 px-4 pt-6">
        <nav class="max-w-7xl mx-auto bg-[#002b36]/90 backdrop-blur-xl rounded-2xl px-8 py-4 flex justify-between items-center shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-white/10 relative overflow-hidden group">
            
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-yellow-500/10 blur-[50px] rounded-full group-hover:bg-yellow-500/20 transition-colors duration-700"></div>

                <a href="{% url 'home' %}" class="flex items-center gap-3 group/logo relative z-10">
                    <div class="relative">
                        <div class="absolute inset-0 bg-yellow-400 blur-xl opacity-0 group-hover/logo:opacity-30 transition-opacity duration-500"></div>
                        
                        <img src="/static/images/Logo_Inazuma_Eleven.webp/"
                            alt="Inazuma Eleven" 
                            class="h-7 w-auto object-contain relative transform group-hover/logo:-rotate-2 group-hover/logo:scale-110 transition-all duration-300 drop-shadow-[0_2px_10px_rgba(255,255,255,0.2)]"
                            onerror="this.style.display='none'"> 
                    </div>

                    <span class="text-white font-black tracking-tighter text-2xl italic uppercase group-hover/logo:text-yellow-400 transition-colors">
                        Fut<span class="text-yellow-400 group-hover/logo:text-white">Draft</span>
                    </span>
                </a>

            <div class="hidden md:flex items-center space-x-1 relative z-10">
                {% with nav_class="px-4 py-2 rounded-xl text-sm font-black uppercase italic tracking-widest transition-all duration-300 relative group/link" %}
                
                <a href="{% url 'home' %}" class="{{ nav_class }} {% if request.resolver_match.url_name == 'home' %}text-yellow-400{% else %}text-white/70 hover:text-white{% endif %}">
                    Home
                    <span class="absolute bottom-1 left-4 right-4 h-0.5 bg-yellow-400 scale-x-0 group-hover/link:scale-x-100 {% if request.resolver_match.url_name == 'home' %}scale-x-100{% endif %} transition-transform duration-300"></span>
                </a>

                <a href="{% url 'players_list' %}" class="{{ nav_class }} {% if request.resolver_match.url_name == 'players_list' %}text-yellow-400{% else %}text-white/70 hover:text-white{% endif %}">
                    Players
                    <span class="absolute bottom-1 left-4 right-4 h-0.5 bg-yellow-400 scale-x-0 group-hover/link:scale-x-100 {% if request.resolver_match.url_name == 'players_list' %}scale-x-100{% endif %} transition-transform duration-300"></span>
                </a>

                <a href="{% url 'teams_list' %}" class="{{ nav_class }} {% if request.resolver_match.url_name == 'teams_list' %}text-yellow-400{% else %}text-white/70 hover:text-white{% endif %}">
                    Teams
                    <span class="absolute bottom-1 left-4 right-4 h-0.5 bg-yellow-400 scale-x-0 group-hover/link:scale-x-100 {% if request.resolver_match.url_name == 'teams_list' %}scale-x-100{% endif %} transition-transform duration-300"></span>
                </a>

                {% if user.is_authenticated %}
                    <a href="{% url 'my_drafts' %}" class="{{ nav_class }} {% if request.resolver_match.url_name == 'my_drafts' %}text-yellow-400{% else %}text-white/70 hover:text-white{% endif %}">
                        Library
                        <span class="absolute bottom-1 left-4 right-4 h-0.5 bg-yellow-400 scale-x-0 group-hover/link:scale-x-100 {% if request.resolver_match.url_name == 'my_drafts' %}scale-x-100{% endif %} transition-transform duration-300"></span>
                    </a>
                {% endif %}

                <a href="{% url 'game' %}" class="ml-4 bg-yellow-500 hover:bg-yellow-400 text-[#002b36] px-6 py-2.5 rounded-xl text-sm font-black uppercase italic tracking-tighter shadow-[0_0_20px_rgba(234,179,8,0.3)] transition-all hover:scale-105 active:scale-95">
                    Start Draft
                </a>
                {% endwith %}
            </div>

            <div class="flex items-center gap-4 relative z-10">
                <div class="w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-yellow-400 hover:bg-yellow-400 hover:text-[#002b36] cursor-pointer transition-all duration-500 group/user shadow-inner">
                    <svg class="w-5 h-5 group-hover/user:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/>
                    </svg>
                </div>
                <div class="md:hidden text-white cursor-pointer">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
                </div>
            </div>
        </nav>
    </div>

    {% block body %}
    {% endblock %}

</body>
</html>
