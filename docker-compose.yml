services:
  django:
    build:
      context: ./DjangoProject1
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "8000:8000"
    command: sh -c "sh /app/banners/djangobanner.sh && sh /app/start.sh"
    volumes:
      - ./DjangoProject1/db.sqlite3:/app/db.sqlite3
      - ./DjangoProject1:/app
    #   - webdata:/app/db #producció naim diu k esta perfe
  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "5000:5000"
    command: sh -c "sh /app/banners/apibanner.sh && uv run uvicorn main:app --host 0.0.0.0 --port 5000" # decoració per mostrar la url de l'API al iniciar el contenedor si algo falla podem borrar

