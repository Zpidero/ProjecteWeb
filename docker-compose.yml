services:
  django:
    build:
      context: ./DjangoProject1
      dockerfile: Dockerfile
      
    ports:
      - "8000:8000"
    command: sh -c "sh /app/banners/djangobanner.sh && uv run python manage.py runserver 0.0.0.0:8000" #simplement per mostrar la url de Django al iniciar el contenedor si algo falla podem borrar

  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    ports:
      - "5000:5000"
    command: sh -c "sh /app/banners/apibanner.sh && uv run uvicorn main:app --host 0.0.0.0 --port 5000" # decoració per mostrar la url de l'API al iniciar el contenedor si algo falla podem borrar